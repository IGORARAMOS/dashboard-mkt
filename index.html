<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard MKT — Contas a Pagar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
  --red:#f85149;--red-s:#3d1a1a;--red-m:#7d2020;
  --green:#3fb950;--green-s:#1a2e1a;
  --orange:#d29922;--orange-s:#2d2005;
  --purple:#bc8cff;--purple-s:#2a1a3e;
  --gold:#e3b341;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
/* ── HEADER ── */
.header{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.header-left h1{font-size:20px;font-weight:700;letter-spacing:.5px;color:#fff}
.header-left p{font-size:12px;color:var(--muted);margin-top:3px}
.badge-ref{background:#1f3a4a;color:var(--accent);font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--accent)}
/* ── NAV TABS ── */
.nav{display:flex;gap:4px;padding:12px 28px 0;background:var(--surface);border-bottom:1px solid var(--border)}
.nav-btn{padding:8px 18px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;border-bottom:2px solid transparent;transition:all .2s;border-radius:4px 4px 0 0}
.nav-btn:hover{color:var(--text);background:var(--surface2)}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface2)}
/* ── PAGES ── */
.page{display:none;padding:24px 28px;animation:fadeIn .25s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* ── KPI GRID ── */
.kpi
