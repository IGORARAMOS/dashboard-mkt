<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Marketing</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .page { display: none; }
        .page.active { display: block; }
        .nav-btn.active { background-color: #3b82f6; color: white; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white shadow-md p-4 flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-gray-800">Dashboard MKT</h1>
        <div class="flex gap-2">
            <button onclick="showPage('dashboard')" id="btn-dashboard" class="nav-btn active px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-200 transition">Dashboard</button>
            <button onclick="showPage('tabela')" id="btn-tabela" class="nav-btn px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-200 transition">Tabela de Dados</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4">
        
        <div id="dashboard" class="page active space-y-6">
            
            <div class="bg-white p-4 rounded-xl shadow-sm flex flex-wrap gap-4 items-center">
                <div class="flex flex-col">
                    <label class="text-xs font-semibold text-gray-500 mb-1">FILIAL</label>
                    <select id="filterFilial" onchange="applyFilters()" class="border rounded-lg p-2 bg-gray-50 text-sm min-w-[200px]">
                        <option value="">Todas</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-xs font-semibold text-gray-500 mb-1">STATUS</label>
                    <select id="filterStatus" onchange="applyFilters()" class="border rounded-lg p-2 bg-gray-50 text-sm min-w-[150px]">
                        <option value="">Todos</option>
                        <option value="Em aberto">Em aberto</option>
                        <option value="Vencido">Vencido</option>
                    </select>
                </div>
            </div>

            <div id="kpiContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-sm font-medium text-gray-500">Saldo Total</p>
                    <h3 id="kpiTotal" class="text-2xl font-bold text-gray-800">R$ 0,00</h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-red-500">
                    <p class="text-sm font-medium text-gray-500">Total Vencido</p>
                    <h3 id="kpiVencido" class="text-2xl font-bold text-red-600">R$ 0,00</h3>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                    <p class="text-sm font-medium text-gray-500">A Vencer</p>
                    <h3 id="kpiAVencer" class="text-2xl font-bold text-green-600">R$ 0,00</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-4 rounded-xl shadow-sm">
                    <h4 class="text-sm font-semibold text-gray-700 mb-4">Evolução por Classificação</h4>
                    <canvas id="chartClassificacao"></canvas>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm">
                    <h4 class="text-sm font-semibold text-gray-700 mb-4">Top Fornecedores</h4>
                    <canvas id="chartFornecedores"></canvas>
                </div>
            </div>

        </div>

        <div id="tabela" class="page bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h3 class="font-semibold text-gray-700">Listagem de Parcelas</h3>
                <span id="tableInfo" class="text-xs text-gray-500 font-medium"></span>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-600">
                    <thead class="bg-gray-100 text-xs text-gray-700 uppercase font-semibold">
                        <tr>
                            <th class="p-4">Filial</th>
                            <th class="p-4">Fornecedor</th>
                            <th class="p-4">Nr Doc / Parcela</th>
                            <th class="p-4">Vencimento</th>
                            <th class="p-4">Classificação</th>
                            <th class="p-4">Valor</th>
                            <th class="p-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-200">
                        </tbody>
                </table>
            </div>

            <div class="p-4 border-t flex justify-between items-center bg-gray-50">
                <button onclick="changePage(-1)" id="btnPrev" class="px-4 py-2 border rounded-lg text-sm font-medium text-gray-600 bg-white hover:bg-gray-100 disabled:opacity-50 transition">Anterior</button>
                <span id="pageInfo" class="text-sm text-gray-600 font-medium">Página 1</span>
                <button onclick="changePage(1)" id="btnNext" class="px-4 py-2 border rounded-lg text-sm font-medium text-gray-600 bg-white hover:bg-gray-100 disabled:opacity-50 transition">Próxima</button>
            </div>
        </div>

    </div>

    <script>
        // URL de comunicação com o seu Apps Script
        const API_URL = 'https://script.google.com/macros/s/AKfycbw3PRhwQRz5TtHqmlz_UWUwWAam4onXPD_ZlI66zV0vkO6XlogjA1N0ELDnw-qRGt1R/exec';

        // Estrutura global de armazenamento dos dados tratada
        let RAW_DATA = [];
        let FILTERED_DATA = [];
        
        let currentPage = 1;
        const rowsPerPage = 10;

        // Instâncias Globais dos Gráficos para evitar duplicações/erros ao atualizar
        let chartClassObj = null;
        let chartFornObj = null;

        // Formatadores numéricos básicos
        const fmt = v => 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        // Controle de Alternância de Abas/Páginas
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
        }

        // Requisição Principal e Carregamento Automático
        async function carregarDados() {
            try {
                console.log("Conectando à planilha...");
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Falha HTTP: ' + response.status);
                
                const resJson = await response.json();
                console.log("Dados brutos vindos da planilha:", resJson);

                // Normaliza independente se vier envelopado num objeto ou array direto
                let listaBruta = Array.isArray(resJson) ? resJson : (resJson.parcelas || []);

                // Mapeia e sanitiza as colunas exatamente como estão em MAIÚSCULO na sua planilha
                RAW_DATA = listaBruta.map(item => {
                    let valorLimpo = parseFloat(String(item.VALOR || item.SALDO_EM_ABERTO || 0).replace(',', '.'));
                    if (isNaN(valorLimpo)) valorLimpo = 0;

                    return {
                        filial: item.NOME_FANTASIA || "Não Informado",
                        fornecedor: item.AGENTE || "Não Informado",
                        nrDoc: item.NR_DOC || item.NR_DOCUMENTO || "-",
                        parcela: item.PARCELA || "1",
                        vencimento: item.VENCIMENTO || "-",
                        classificacao: item.CLA_DESCRICAO || "Outros",
                        valor: valorLimpo,
                        status: String(item.STATUS_VENCIMENTO || "Em aberto").trim()
                    };
                });

                buildFilterOptions();
                applyFilters();

            } catch (error) {
                console.error('Erro crítico ao ler planilha:', error);
                alert('Erro ao carregar dados. Verifique a publicação do seu script e o console F12.');
            }
        }

        // Constrói dinamicamente as opções do select de Filiais baseado na planilha
        function buildFilterOptions() {
            const filiais = [...new Set(RAW_DATA.map(i => i.filial))].sort();
            const selectFilial = document.getElementById('filterFilial');
            
            // Limpa opções antigas mantendo a primeira "Todas"
            selectFilial.innerHTML = '<option value="">Todas</option>';
            filiais.forEach(f => {
                selectFilial.innerHTML += `<option value="${f}">${f}</option>`;
            });
        }

        // Processa os filtros de tela e reconstrói cálculos e tabelas
        function applyFilters() {
            const fFilial = document.getElementById('filterFilial').value;
            const fStatus = document.getElementById('filterStatus').value;

            FILTERED_DATA = RAW_DATA.filter(item => {
                const matchFilial = !fFilial || item.filial === fFilial;
                const matchStatus = !fStatus || item.status.toLowerCase() === fStatus.toLowerCase();
                return matchFilial && matchStatus;
            });

            currentPage = 1; // Reseta para a primeira página
            calculateKPIs();
            renderCharts();
            renderTable();
        }

        // Calcula dinamicamente os somatórios dos cartões de KPI
        function calculateKPIs() {
            let total = 0;
            let vencido = 0;
            let aVencer = 0;

            FILTERED_DATA.forEach(item => {
                total += item.valor;
                if (item.status.toLowerCase().includes('vencido')) {
                    vencido += item.valor;
                } else {
                    aVencer += item.valor;
                }
            });

            document.getElementById('kpiTotal').innerText = fmt(total);
            document.getElementById('kpiVencido').innerText = fmt(vencid);
            document.getElementById('kpiAVencer').innerText = fmt(aVencer);
        }

        // Renderiza e destrói instâncias antigas dos gráficos (Chart.js)
        function renderCharts() {
            // Agrupamento por Classificação
            const clMap = {};
            // Agrupamento por Fornecedor
            const fnMap = {};

            FILTERED_DATA.forEach(item => {
                clMap[item.classificacao] = (clMap[item.classificacao] || 0) + item.valor;
                fnMap[item.fornecedor] = (fnMap[item.fornecedor] || 0) + item.valor;
            });

            // Ordena e pega o Top 5 Fornecedores
            const topFornecedores = Object.entries(fnMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            // --- GRÁFICO 1: Classificações ---
            if (chartClassObj) chartClassObj.destroy();
            chartClassObj = new Chart(document.getElementById('chartClassificacao'), {
                type: 'bar',
                data: {
                    labels: Object.keys(clMap),
                    datasets: [{
                        label: 'Total por Classificação',
                        data: Object.values(clMap),
                        backgroundColor: '#3b82f6',
                        borderRadius: 6
                    }]
                },
                options: { responsive: true }
            });

            // --- GRÁFICO 2: Top Fornecedores ---
            if (chartFornObj) chartFornObj.destroy();
            chartFornObj = new Chart(document.getElementById('chartFornecedores'), {
                type: 'doughnut',
                data: {
                    labels: topFornecedores.map(f => f[0]),
                    datasets: [{
                        data: topFornecedores.map(f => f[1]),
                        backgroundColor: ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6']
                    }]
                },
                options: { responsive: true }
            });
        }

        // Renderiza a tabela com paginação ativa
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = startIndex + rowsPerPage;
            const pageItems = FILTERED_DATA.slice(startIndex, endIndex);

            pageItems.forEach(item => {
                const badgeColor = item.status.toLowerCase().includes('vencido') ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800';
                
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition border-b">
                        <td class="p-4 font-medium text-gray-800">${item.filial}</td>
                        <td class="p-4">${item.fornecedor}</td>
                        <td class="p-4 text-xs text-gray-500">${item.nrDoc} <span class="text-gray-400">(${item.parcela})</span></td>
                        <td class="p-4">${item.vencimento}</td>
                        <td class="p-4 text-xs text-gray-500">${item.classificacao}</td>
                        <td class="p-4 font-semibold text-gray-700">${fmt(item.valor)}</td>
                        <td class="p-4"><span class="px-2.5 py-1 rounded-full text-xs font-semibold ${badgeColor}">${item.status}</span></td>
                    </tr>
                `;
            });

            // Atualização dos botões e contadores de rodapé
            const totalPages = Math.ceil(FILTERED_DATA.length / rowsPerPage) || 1;
            document.getElementById('pageInfo').innerText = `Página ${currentPage} de ${totalPages}`;
            document.getElementById('tableInfo').innerText = `${FILTERED_DATA.length} parcelas encontradas`;
            
            document.getElementById('btnPrev').disabled = currentPage === 1;
            document.getElementById('btnNext').disabled = currentPage === totalPages;
        }

        // Navegação de páginas na listagem
        function changePage(direction) {
            currentPage += direction;
            renderTable();
        }

        // Inicialização Automática do painel completo
        carregarDados();
    </script>
</body>
</html>
